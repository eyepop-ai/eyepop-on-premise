name: eyepop-on-premise

volumes:
  pipeline_vlm_cache:

services:
  eyepop-instance:
    image: ${EYEPOP_RUNTIME_IMAGE:-us-west1-docker.pkg.dev/eyepop-staging/worker/runtime-cuda:v3.36.4}
    depends_on:
      pipeline-vlm:
        condition: service_started
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - type: bind
        source: ./instance/eyepop-instance.yaml
        target: /etc/eyepop-instance.yml
        read_only: true
      - type: bind
        source: ./agents.d
        target: /opt/eyepop/agent.d
    tmpfs:
      - /tmp:size=8g,mode=1777
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/agent/health || wget -qO- http://127.0.0.1:8080/agent/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  pipeline-vlm:
    image: ${EYEPOP_VLM_WORKER_IMAGE:-us-west1-docker.pkg.dev/eyepop-staging/vlm-worker/qwen3-instruct:v3.12.2}
    ports:
      - "18080:8080"
    environment:
      DTYPE: auto
    volumes:
      - type: volume
        source: pipeline_vlm_cache
        target: /home/app/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || wget -qO- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 120
      start_period: 60s
    restart: unless-stopped
